<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kubota sanchi - Creative Developer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">kubota sanchi</div>
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#portfolio">Works</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero" data-animation="fade-in">
            <div class="hero-content">
                <h1 class="hero-title">Creative<span class="gradient-text"> Developer</span> & Designer</h1>
                <p class="hero-subtitle">Crafting digital experiences that inspire and engage</p>
                <a href="#portfolio" class="cta-button">Explore My Work</a>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about" data-animation="slide-up">
            <div class="container">
                <h2>概要</h2>
                <div class="about-grid">
                    <div class="about-text">
                        <p>説明文1</p>
                        <p>説明文2</p>
                    </div>
                    <div class="about-image">
                        <div class="placeholder-image">[Image]</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Portfolio Section -->
        <section id="portfolio" class="portfolio" data-animation="scale">
            <div class="container">
                <h2>実績</h2>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact" data-animation="fade-in">
            <div class="container">
                <h2>連絡先</h2>
                <p class="contact-subtitle">ご連絡はこちらまで</p>
                <div class="contact-content">
                    <a href="mailto:contact@kubotasanchi.com" class="cta-button primary">メール</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 kubota sanchi. All rights reserved.</p>
            <div class="social-links">
                <a href="#">Twitter</a>
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
